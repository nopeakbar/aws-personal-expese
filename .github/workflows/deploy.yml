name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main # (Atau ganti 'master' kalau repo lu pakai master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        # Script di bawah ini persis seperti yang lu ketik manual di terminal AWS
        script: |
          cd aws-personal-expese 
          git pull origin main
          docker build -t bandha-api .
          docker rm -f bandha-container || true
          docker run -d -p 3000:3000 --env-file .env --name bandha-container bandha-api
          docker image prune -f